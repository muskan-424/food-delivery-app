name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  MONGODB_VERSION: '6.0'

jobs:
  # Test Backend
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Create test environment file
        run: |
          cd backend
          cat > .env << EOF
          JWT_SECRET=test_jwt_secret_for_ci_cd_pipeline_testing_only
          JWT_REFRESH_SECRET=test_refresh_secret_for_ci_cd_pipeline_testing_only
          SALT=10
          MONGO_URL=mongodb://localhost:27017/food-delivery-test
          ENCRYPTION_KEY=a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456
          EMAIL_SERVICE=gmail
          EMAIL_USER=test@example.com
          EMAIL_PASSWORD=test_password
          FRONTEND_URL=http://localhost:5173
          ENABLE_SCHEDULED_JOBS=false
          PORT=4000
          EOF

      - name: Wait for MongoDB
        run: |
          timeout 30 bash -c 'until mongosh --eval "db.adminCommand(\"ping\")" > /dev/null 2>&1; do sleep 1; done'

      - name: Run backend configuration test
        run: |
          cd backend
          node test-setup.js

      - name: Test backend syntax
        run: |
          cd backend
          find . -name "*.js" -not -path "./node_modules/*" -exec node --check {} \;

      - name: Start backend server (test)
        run: |
          cd backend
          timeout 30s npm start || true

  # Test Frontend
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Create frontend environment file
        run: |
          cd frontend
          cat > .env.local << EOF
          VITE_API_URL=http://localhost:4000
          VITE_APP_NAME=Food Delivery App
          VITE_NODE_ENV=production
          EOF

      - name: Run frontend configuration test
        run: |
          cd frontend
          node test-setup.js

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Test frontend build
        run: |
          cd frontend
          ls -la dist/
          test -f dist/index.html

  # Test Admin Panel
  test-admin:
    name: Test Admin Panel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        run: |
          cd admin
          npm ci

      - name: Create admin environment file
        run: |
          cd admin
          cat > .env.local << EOF
          VITE_API_URL=http://localhost:4000
          VITE_APP_NAME=Food Delivery Admin
          VITE_NODE_ENV=production
          VITE_ADMIN_SESSION_TIMEOUT=3600000
          VITE_ADMIN_TOKEN_REFRESH_INTERVAL=300000
          EOF

      - name: Run admin configuration test
        run: |
          cd admin
          node test-setup.js

      - name: Build admin panel
        run: |
          cd admin
          npm run build

      - name: Test admin build
        run: |
          cd admin
          ls -la dist/
          test -f dist/index.html

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-admin]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies for security scan
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci
          cd ../admin && npm ci

      - name: Run security audit - Backend
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Run security audit - Frontend
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: Run security audit - Admin
        run: |
          cd admin
          npm audit --audit-level=high

  # Build and Deploy (only on main branch)
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-admin, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build all applications
        run: |
          # Build Frontend
          cd frontend
          npm ci
          cat > .env.local << EOF
          VITE_API_URL=${{ secrets.PRODUCTION_API_URL }}
          VITE_APP_NAME=Food Delivery App
          VITE_NODE_ENV=production
          EOF
          npm run build
          
          # Build Admin
          cd ../admin
          npm ci
          cat > .env.local << EOF
          VITE_API_URL=${{ secrets.PRODUCTION_API_URL }}
          VITE_APP_NAME=Food Delivery Admin
          VITE_NODE_ENV=production
          VITE_ADMIN_SESSION_TIMEOUT=3600000
          VITE_ADMIN_TOKEN_REFRESH_INTERVAL=300000
          EOF
          npm run build

      - name: Create deployment artifacts
        run: |
          mkdir -p deployment
          cp -r frontend/dist deployment/frontend
          cp -r admin/dist deployment/admin
          cp -r backend deployment/backend
          
          # Create deployment info
          cat > deployment/deployment-info.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "workflow_run": "${{ github.run_number }}"
          }
          EOF

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ github.run_number }}
          path: deployment/
          retention-days: 30

      # Optional: Deploy to your hosting service
      # Uncomment and configure based on your hosting provider
      
      # - name: Deploy to Render/Vercel/Netlify
      #   run: |
      #     # Add your deployment commands here
      #     echo "Deploy to your hosting service"

  # Create Release (only on main branch with tags)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes in this Release
            - Automated release from CI/CD pipeline
            - Commit: ${{ github.sha }}
            - Build: ${{ github.run_number }}
            
            ## Deployment Artifacts
            - Frontend build included
            - Admin panel build included
            - Backend code included
            
            ## Verification
            All tests passed and security scans completed successfully.
          draft: false
          prerelease: false