name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - testing

env:
  NODE_VERSION: '18'

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build applications for staging
        run: |
          # Build Frontend for staging
          cd frontend
          npm ci
          cat > .env.local << EOF
          VITE_API_URL=${{ secrets.STAGING_API_URL || 'https://your-staging-api.com' }}
          VITE_APP_NAME=Food Delivery App (Staging)
          VITE_NODE_ENV=staging
          EOF
          npm run build
          
          # Build Admin for staging
          cd ../admin
          npm ci
          cat > .env.local << EOF
          VITE_API_URL=${{ secrets.STAGING_API_URL || 'https://your-staging-api.com' }}
          VITE_APP_NAME=Food Delivery Admin (Staging)
          VITE_NODE_ENV=staging
          VITE_ADMIN_SESSION_TIMEOUT=3600000
          VITE_ADMIN_TOKEN_REFRESH_INTERVAL=300000
          EOF
          npm run build

      - name: Prepare backend for staging
        run: |
          cd backend
          npm ci --production
          
          # Create staging environment template
          cat > .env.example << EOF
          JWT_SECRET=your_staging_jwt_secret
          JWT_REFRESH_SECRET=your_staging_refresh_secret
          SALT=10
          MONGO_URL=your_staging_mongodb_url
          ENCRYPTION_KEY=your_staging_encryption_key
          EMAIL_SERVICE=gmail
          EMAIL_USER=your_staging_email
          EMAIL_PASSWORD=your_staging_password
          FRONTEND_URL=${{ secrets.STAGING_FRONTEND_URL || 'https://your-staging-frontend.com' }}
          ENABLE_SCHEDULED_JOBS=true
          PORT=4000
          EOF

      - name: Create staging deployment package
        run: |
          mkdir -p staging-deployment
          
          # Copy built applications
          cp -r frontend/dist staging-deployment/frontend
          cp -r admin/dist staging-deployment/admin
          cp -r backend staging-deployment/backend
          
          # Remove development files from backend
          rm -rf staging-deployment/backend/node_modules
          rm -f staging-deployment/backend/.env
          rm -f staging-deployment/backend/test-setup.js
          
          # Create deployment script
          cat > staging-deployment/deploy.sh << 'EOF'
          #!/bin/bash
          echo "Starting Food Delivery App deployment..."
          
          # Install backend dependencies
          cd backend
          npm ci --production
          
          # Create first admin if needed
          echo "To create first admin, run: npm run create-admin"
          
          # Start the application
          echo "To start the application:"
          echo "1. Set up your .env file based on .env.example"
          echo "2. Run: npm run server"
          echo "3. Frontend will be served from ./frontend directory"
          echo "4. Admin will be served from ./admin directory"
          EOF
          
          chmod +x staging-deployment/deploy.sh
          
          # Create deployment info
          cat > staging-deployment/DEPLOYMENT_INFO.md << EOF
          # Staging Deployment Information
          
          **Deployment Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Workflow Run:** ${{ github.run_number }}
          
          ## Applications Included
          - Frontend (User Panel)
          - Admin Panel
          - Backend API
          
          ## Deployment Instructions
          1. Extract this package to your staging server
          2. Run \`./deploy.sh\` to set up the application
          3. Configure your .env file with staging credentials
          4. Create first admin: \`cd backend && npm run create-admin\`
          5. Start the server: \`cd backend && npm run server\`
          
          ## URLs (Configure in your reverse proxy)
          - Frontend: /
          - Admin: /admin
          - API: /api
          
          ## Environment Variables Required
          See backend/.env.example for all required variables.
          EOF

      - name: Upload staging deployment
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-${{ github.run_number }}
          path: staging-deployment/
          retention-days: 7

      # Optional: Deploy to your staging server
      # Uncomment and configure based on your hosting setup
      
      # - name: Deploy to staging server
      #   run: |
      #     # Example deployment commands
      #     # scp -r staging-deployment/ user@staging-server:/path/to/app/
      #     # ssh user@staging-server 'cd /path/to/app && ./deploy.sh'
      #     echo "Configure your staging deployment here"

      - name: Notify deployment status
        run: |
          echo "🚀 Staging deployment completed successfully!"
          echo "📦 Deployment package: staging-deployment-${{ github.run_number }}"
          echo "🔗 Download the artifact to deploy to your staging environment"
          echo "📋 See DEPLOYMENT_INFO.md in the artifact for setup instructions"