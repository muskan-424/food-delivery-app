name: Pull Request Checks

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  # Quick validation for PRs
  validate-pr:
    name: Validate Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check for required files
        run: |
          # Check if all required files exist
          test -f backend/package.json || (echo "Backend package.json missing" && exit 1)
          test -f frontend/package.json || (echo "Frontend package.json missing" && exit 1)
          test -f admin/package.json || (echo "Admin package.json missing" && exit 1)
          test -f README.md || (echo "README.md missing" && exit 1)
          test -f .gitignore || (echo ".gitignore missing" && exit 1)

      - name: Check for sensitive files
        run: |
          # Ensure no sensitive files are committed
          if find . -name ".env" -not -path "./node_modules/*" | grep -q .; then
            echo "ERROR: .env files found in repository!"
            find . -name ".env" -not -path "./node_modules/*"
            exit 1
          fi
          
          if find . -name "*.log" -not -path "./node_modules/*" | grep -q .; then
            echo "WARNING: Log files found in repository"
            find . -name "*.log" -not -path "./node_modules/*"
          fi

      - name: Validate package.json files
        run: |
          cd backend && npm pkg fix && npm pkg validate
          cd ../frontend && npm pkg fix && npm pkg validate
          cd ../admin && npm pkg fix && npm pkg validate

      - name: Check for TODO/FIXME comments
        run: |
          echo "Checking for TODO/FIXME comments..."
          if grep -r "TODO\|FIXME" --include="*.js" --include="*.jsx" --exclude-dir=node_modules .; then
            echo "Found TODO/FIXME comments - please review before merging"
          else
            echo "No TODO/FIXME comments found"
          fi

  # Lint and format check
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies and run linting
        run: |
          # Backend linting
          cd backend
          npm ci
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ]; then
            npm run lint || echo "Backend linting completed with warnings"
          else
            echo "No ESLint config found for backend"
          fi
          
          # Frontend linting
          cd ../frontend
          npm ci
          if [ -f ".eslintrc.cjs" ]; then
            npm run lint || echo "Frontend linting completed with warnings"
          else
            echo "No ESLint config found for frontend"
          fi
          
          # Admin linting
          cd ../admin
          npm ci
          if [ -f ".eslintrc.cjs" ]; then
            npm run lint || echo "Admin linting completed with warnings"
          else
            echo "No ESLint config found for admin"
          fi

  # Documentation check
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check documentation completeness
        run: |
          echo "Checking documentation files..."
          
          # Check if README is updated
          if [ $(wc -l < README.md) -lt 50 ]; then
            echo "WARNING: README.md seems too short"
          fi
          
          # Check for setup guide
          test -f SETUP_AND_RUN_GUIDE.md || (echo "SETUP_AND_RUN_GUIDE.md missing" && exit 1)
          
          # Check for feature documentation
          test -f PROJECT_FEATURES_DOCUMENTATION.md || (echo "PROJECT_FEATURES_DOCUMENTATION.md missing" && exit 1)
          
          # Check if documentation mentions the new changes
          echo "Documentation files found and appear complete"

  # Size check
  bundle-size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build and check bundle sizes
        run: |
          # Build frontend and check size
          cd frontend
          npm ci
          cat > .env.local << EOF
          VITE_API_URL=http://localhost:4000
          VITE_APP_NAME=Food Delivery App
          EOF
          npm run build
          
          FRONTEND_SIZE=$(du -sh dist/ | cut -f1)
          echo "Frontend build size: $FRONTEND_SIZE"
          
          # Build admin and check size
          cd ../admin
          npm ci
          cat > .env.local << EOF
          VITE_API_URL=http://localhost:4000
          VITE_APP_NAME=Food Delivery Admin
          EOF
          npm run build
          
          ADMIN_SIZE=$(du -sh dist/ | cut -f1)
          echo "Admin build size: $ADMIN_SIZE"
          
          # Check if builds are reasonable size (under 50MB each)
          cd ../frontend
          if [ $(du -s dist/ | cut -f1) -gt 51200 ]; then
            echo "WARNING: Frontend build is larger than 50MB"
          fi
          
          cd ../admin
          if [ $(du -s dist/ | cut -f1) -gt 51200 ]; then
            echo "WARNING: Admin build is larger than 50MB"
          fi