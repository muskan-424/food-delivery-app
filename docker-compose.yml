version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: food-delivery-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-food-delivery}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - food-delivery-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: food-delivery-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SALT=${SALT:-10}
      - MONGO_URL=mongodb://mongodb:27017/${MONGO_DB_NAME:-food-delivery}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - EMAIL_SERVICE=${EMAIL_SERVICE:-gmail}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ENABLE_SCHEDULED_JOBS=${ENABLE_SCHEDULED_JOBS:-true}
      - PORT=4000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - food-delivery-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (User Panel)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
        - VITE_APP_NAME=Food Delivery App
    container_name: food-delivery-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - food-delivery-network

  # Admin Panel
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
        - VITE_APP_NAME=Food Delivery Admin
        - VITE_ADMIN_SESSION_TIMEOUT=${VITE_ADMIN_SESSION_TIMEOUT:-3600000}
        - VITE_ADMIN_TOKEN_REFRESH_INTERVAL=${VITE_ADMIN_TOKEN_REFRESH_INTERVAL:-300000}
    container_name: food-delivery-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - food-delivery-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: food-delivery-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - admin
      - backend
    networks:
      - food-delivery-network

volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  food-delivery-network:
    driver: bridge